<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Micro-MCP-Ecosystem 模块架构图</title>
  <desc id="desc">用户通过中心 Hub 调度多个 MCP 服务，包括 DevOps 工具服务、文档检索服务和记忆 KV 服务，并参考协议资料。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="service" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="support" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <marker id="dashedArrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .label { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .small { font-size: 18px; opacity: 0.86; }
      .title { font-size: 34px; font-weight: 700; }
      .node-title { font-size: 24px; font-weight: 700; fill: #ffffff; }
      .node-sub { font-size: 17px; fill: rgba(255,255,255,0.9); }
      .node-light { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .node-light-sub { font-size: 16px; fill: #334155; }
      .chip { font-size: 16px; font-weight: 700; fill: #ffffff; }
      .arrow { stroke: #334155; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7c3aed; stroke-width: 2.8; fill: none; stroke-dasharray: 8 8; marker-end: url(#dashedArrow); }
      .arrow-tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; opacity: 0.96; }
      .arrow-label { font-size: 15px; font-weight: 700; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" rx="28" fill="url(#bg)"/>
  <text x="64" y="68" class="label title">Micro-MCP-Ecosystem 模块架构图</text>
  <text x="64" y="102" class="label small">用户通过中心化 Hub 统一调度各类 MCP 服务，并按需引用协议与 SDK 资料。</text>

  <!-- user -->
  <g filter="url(#shadow)">
    <rect x="70" y="290" width="170" height="115" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="155" y="338" text-anchor="middle" class="label node-light">用户 / Agent</text>
    <text x="155" y="366" text-anchor="middle" class="label node-light-sub">任务输入</text>
  </g>

  <!-- hub -->
  <g filter="url(#shadow)">
    <rect x="430" y="245" width="400" height="205" rx="28" fill="url(#hub)"/>
    <text x="630" y="300" text-anchor="middle" class="label node-title">mcp-core-hub / hub.py</text>
    <text x="630" y="336" text-anchor="middle" class="label node-sub">中心化调度层</text>
    <text x="630" y="368" text-anchor="middle" class="label node-sub">连接多个 MCP Server</text>
    <text x="630" y="400" text-anchor="middle" class="label node-sub">组织工具选择与推理循环</text>
  </g>

  <!-- services -->
  <g filter="url(#shadow)">
    <rect x="890" y="146" width="320" height="116" rx="22" fill="url(#service)"/>
    <text x="1050" y="189" text-anchor="middle" class="label node-title">server.py</text>
    <text x="1050" y="220" text-anchor="middle" class="label node-sub">DevOps 工具服务</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="294" width="320" height="116" rx="22" fill="url(#service)"/>
    <text x="1050" y="337" text-anchor="middle" class="label node-title">mcp-server-rag-docs</text>
    <text x="1050" y="368" text-anchor="middle" class="label node-sub">文档检索服务</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="442" width="320" height="116" rx="22" fill="url(#service)"/>
    <text x="1050" y="485" text-anchor="middle" class="label node-title">mcp-server-memory-kv</text>
    <text x="1050" y="516" text-anchor="middle" class="label node-sub">记忆 KV 服务</text>
  </g>

  <!-- support -->
  <g filter="url(#shadow)">
    <rect x="460" y="520" width="340" height="126" rx="24" fill="url(#support)"/>
    <text x="630" y="565" text-anchor="middle" class="label node-title">protocals /</text>
    <text x="630" y="598" text-anchor="middle" class="label node-sub">协议与 SDK 学习资料</text>
    <rect x="535" y="620" width="190" height="26" rx="13" fill="rgba(255,255,255,0.18)"/>
    <text x="630" y="639" text-anchor="middle" class="label chip">参考 / 学习 / 对齐实现</text>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M240 348 C315 348, 350 348, 430 348"/>
  <path class="arrow" d="M830 322 C858 322, 872 214, 890 204"/>
  <path class="arrow" d="M830 348 C858 348, 872 352, 890 352"/>
  <path class="arrow" d="M830 374 C858 374, 872 500, 890 500"/>
  <path class="arrow-soft" d="M700 450 C700 488, 650 498, 630 520"/>

  <!-- labels -->
  <text x="335" y="342" text-anchor="middle" class="label small">任务调度</text>
  <rect x="890" y="108" width="144" height="30" rx="15" class="arrow-tag"/>
  <text x="962" y="128" text-anchor="middle" class="label arrow-label">工具调用</text>
  <rect x="890" y="264" width="144" height="30" rx="15" class="arrow-tag"/>
  <text x="962" y="284" text-anchor="middle" class="label arrow-label">知识检索</text>
  <rect x="890" y="418" width="144" height="30" rx="15" class="arrow-tag"/>
  <text x="962" y="438" text-anchor="middle" class="label arrow-label">长期记忆</text>
</svg>
